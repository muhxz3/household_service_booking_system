<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - My Eazy Day</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="backcolor">
    <div class="container">
        <div class="login-box">
            <h2>Create Account</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <p style="color: {% if category == 'error' %}red{% else %}green{% endif %}; margin-bottom: 15px; font-weight: bold;">
                            {{ message }}
                        </p>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/register" method="POST">
                <div class="input-group">
                    <label for="cust_name">Full Name</label>
                    <input type="text" id="cust_name" name="cust_name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="input-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" required>
                </div>
                <div class="input-group">
                    <label for="region">Region</label>
                    <select id="region" name="region" required>
                        <option value="" disabled selected>Select your area</option>
                        <option value="North">North (Kumbala, Arikkady...)</option>
                        <option value="South">South (Chandragiri, Bekal...)</option>
                        <option value="East">East (Maipady, Madhur...)</option>
                        <option value="West">West (Thalangara Area)</option>
                    </select>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p>Already have an account? <a href="/login">Login here</a></p>
            <p><a href="/index.html">Back to Home</a></p>
        </div>
    </div>
</body>
</html>
