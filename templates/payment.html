<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - My Eazy Day</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Secure Payment</h2>
            <p>Complete your booking for <strong>{{ booking.service_name }}</strong></p>
            <h3 style="color: var(--primary-color);">Total Amount: ₹{{ "%.2f"|format(booking.amount) }}</h3>

            <form action="{{ url_for('payment_page', booking_id=booking.booking_id) }}" method="POST">
                <div class="input-group">
                    <label for="card_number">Card Number</label>
                    <input type="text" id="card_number" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label for="expiry">Expiry Date</label>
                        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label for="cvv">CVV</label>
                        <input type="password" id="cvv" placeholder="123" maxlength="3" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="card_name">Cardholder Name</label>
                    <input type="text" id="card_name" placeholder="Name on Card" required>
                </div>

                <button type="submit" class="btn">Pay Now</button>
            </form>
            
            <p style="margin-top: 15px; font-size: 0.8em; color: #666;">This is a mock payment gateway. No real money will be deducted.</p>
            <p><a href="{{ url_for('my_bookings') }}">Cancel Payment</a></p>
        </div>
    </div>
</body>
</html>
