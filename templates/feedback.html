<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Service - My Eazy Day</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Rate Your Service</h2>
            <p>How was your experience?</p>

            <form action="/feedback/{{ booking_id }}" method="POST">
                <label class="form-label" style="text-align: center;">Your Rating</label>
                <div class="star-rating" id="starContainer">
                    <span data-value="1">★</span>
                    <span data-value="2">★</span>
                    <span data-value="3">★</span>
                    <span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>
                <input type="hidden" name="rating" id="selected_rating" value="5" required>

                <div class="input-group">
                    <label for="comments">Comments</label>
                    <textarea name="comments" id="comments" rows="4" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" placeholder="Tell us more..."></textarea>
                </div>

                <button type="submit" class="btn">Submit Feedback</button>
            </form>
            <p><a href="/my_bookings">Cancel</a></p>
        </div>
    </div>

    <script>
        const stars = document.querySelectorAll('.star-rating span');
        const ratingInput = document.getElementById('selected_rating');

        function updateStars(val, className) {
            stars.forEach(s => {
                if (parseInt(s.getAttribute('data-value')) <= val) {
                    s.classList.add(className);
                } else {
                    s.classList.remove(className);
                }
            });
        }

        stars.forEach(star => {
            // Hover effect
            star.addEventListener('mouseover', () => {
                const val = parseInt(star.getAttribute('data-value'));
                updateStars(val, 'hovered');
            });

            star.addEventListener('mouseout', () => {
                stars.forEach(s => s.classList.remove('hovered'));
            });

            // Click selection
            star.addEventListener('click', () => {
                const val = parseInt(star.getAttribute('data-value'));
                ratingInput.value = val;
                updateStars(val, 'active');
            });
        });
        
        // Set default active (5 stars)
        updateStars(5, 'active');
    </script>
</body>
</html>
