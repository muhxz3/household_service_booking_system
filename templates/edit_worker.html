<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Worker - My Eazy Day</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="backcolor">
    <div class="container">
        <div class="login-box">
            <h2>Edit Worker</h2>
            <form action="/admin/edit_worker/{{ worker.worker_id }}" method="POST">
                <div class="input-group">
                    <label for="worker_name">Name</label>
                    <input type="text" id="worker_name" name="worker_name" value="{{ worker.worker_name }}" required>
                </div>
                <div class="input-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" value="{{ worker.phone }}" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ worker.email }}" required>
                </div>
                <div class="input-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" value="{{ worker.address }}" required>
                </div>
                <div class="input-group">
                    <label for="skills">Skills</label>
                    <input type="text" id="skills" name="skills" value="{{ worker.skills }}" required>
                </div>
                <button type="submit" class="btn">Update Worker</button>
            </form>
            <p style="margin-top: 15px;"><a href="/admin/manage_workers">Cancel</a></p>
        </div>
    </div>
</body>
</html>
